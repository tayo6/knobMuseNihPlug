[package]
name = "gradient-knob-vst3"
version = "0.1.0"
edition = "2021"
rust-version = "1.77"

[lib]
crate-type = ["cdylib"]
name = "gradient_knob_vst3"

[dependencies]
# use git, not crates-io - avoids "no matching package"
nih_plug = { git = "https://github.com/robbert-vdh/nih-plug.git", rev = "68b3b864", features = ["standalone"] }
nih_plug_egui = { git = "https://github.com/robbert-vdh/nih-plug.git", rev = "68b3b864", features = ["opengl"] }
egui = "0.27.2"

[workspace]
members = [".", "xtask"]