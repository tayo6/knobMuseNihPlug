[package]
name = "gradient-knob-vst3"
version = "0.1.0"
edition = "2021"
rust-version = "1.77"
description = "Circular Gradient Knob VST3 - Win7 compatible"
license = "MIT"

[lib]
crate-type = ["cdylib"]
name = "gradient_knob_vst3"

[dependencies]
# use 0.4 range, not 0.3.1
nih_plug = { version = "0.4" }
nih_plug_egui = { version = "0.4", features = ["opengl"] } # opengl = glow, Win7 safe
egui = { version = "0.28.1" } # 0.28 still uses winit 0.29 -> Win7 OK

[workspace]
members = [".", "xtask"]