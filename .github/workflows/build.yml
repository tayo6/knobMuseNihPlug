name: Build VST3 Win7
on: [push, workflow_dispatch]
jobs:
  build-win:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.77.2 - last Win7 pc-windows-msvc
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.77.2"

      - name: Clean
        run: |
          Remove-Item Cargo.lock -Force -ErrorAction SilentlyContinue

      - name: Bundle
        run: cargo run -p xtask -- bundle gradient-knob-vst3 --release

      - uses: actions/upload-artifact@v4
        with:
          name: GradientKnob-Win7-VST3
          path: target/bundled/**/*.vst3